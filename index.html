  <style>
    :root{
      --border:#e5e7eb;
      --muted:#6b7280;
      --pink-50:#fff1f7;
      --pink-100:#FCE7F3;
      --pink-200:#FBCFE8;
      --pink-300:#F9A8D4;
      --pink-400:#FB7185;
      --pink-500:#F472B6;
      --wine:#831843;
      --bg:#ffffff;
    }

    body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif; background: var(--bg); }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }

    #app { display: grid; grid-template-columns: 320px 1fr 360px; height: 100vh; }
    #left, #right { padding: 12px; overflow: auto; }
    #left { border-right: 1px solid var(--border); }
    #right { border-left: 1px solid var(--border); }

    #cyWrap{ position: relative; width:100%; height:100%; overflow: hidden; }
    #cy { width: 100%; height: 100%; }

    .h { font-weight: 700; margin: 6px 0 10px; }
    .muted { color: var(--muted); font-size: 12px; line-height: 1.4; }
    .box { border: 1px solid var(--border); border-radius: 10px; padding: 10px; margin: 10px 0; background:#fff; }

    input[type="text"], select {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #fff;
    }

    button {
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      background: #fff;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover { background: #f9fafb; }

    .tag {
      display:inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 12px;
      margin-right: 6px;
      background: #fff;
    }

    .listHeader {
      display:flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin: 0 0 8px;
    }
    .pill {
      display:inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      white-space: nowrap;
    }
    #listWrap {
      max-height: 42vh;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      -webkit-overflow-scrolling: touch;
    }
    table { border-collapse: collapse; width: 100%; }
    thead th {
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1;
      font-size: 12px;
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      color: #374151;
    }
    tbody td {
      font-size: 12px;
      padding: 8px 10px;
      border-bottom: 1px solid #f3f4f6;
      vertical-align: top;
      color: #111827;
    }
    tbody tr:hover { background: var(--pink-50); cursor: pointer; }

    .seg { display:flex; gap: 6px; margin: 8px 0 8px; }
    .seg button{ flex: 1; font-size: 12px; padding: 8px 8px; border-radius: 999px; }
    .seg button.active{
      border-color: var(--pink-300);
      background: var(--pink-100);
      color: var(--wine);
      font-weight: 600;
    }

    .layoutBtns { display:flex; gap: 8px; margin-top: 6px; }
    .layoutBtns button{ flex:1; }
    .layoutBtns button.active{
      border-color: var(--pink-300);
      background: var(--pink-100);
      color: var(--wine);
      font-weight: 700;
    }

    #floatCtrl{
      position: absolute;
      right: 12px;
      bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 50;
      pointer-events: auto;
    }
    .zcol{ display:flex; flex-direction: column; gap: 8px; align-items: flex-end; }
    .fbtn{
      width: 44px; height: 44px; border-radius: 14px;
      border: 1px solid var(--border); background: rgba(255,255,255,0.92);
      backdrop-filter: blur(6px); box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      display: grid; place-items: center; font-size: 18px; font-weight: 800;
      color: #111827; cursor: pointer; user-select: none;
    }
    .dpad{ display: grid; grid-template-columns: repeat(3, 44px); gap: 6px; }
    .dpad .blank{ visibility:hidden; }

    #btnClearHL{
      display:none; width: 44px; height: 44px; border-radius: 14px;
      border: 1px solid var(--border); background: rgba(255,255,255,0.92);
      backdrop-filter: blur(6px); box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      place-items: center; font-size: 12px; font-weight: 900; color: #111827;
      cursor: pointer;
    }

    #mobileTabs{ display:none; }
    .onlyMobile{ display:none; }

    footer#deskFooter{
      position: fixed; bottom: 6px; right: 10px; font-size: 11px;
      color: #6b7280; background: rgba(255,255,255,0.82);
      padding: 2px 6px; border-radius: 6px; z-index: 10;
    }

    @media (max-width: 900px) {
      #app{ grid-template-columns: 1fr; height: auto; min-height: 100vh; }
      #left, #right, #cyWrap{ display:none; padding: 12px; }
      #cyWrap{ padding: 0; height: calc(100vh - 64px); }
      #left, #right{ height: calc(100vh - 64px); overflow: auto; }
      
      #mobileTabs{
        position: fixed; left: 0; right: 0; bottom: 0; display: flex;
        gap: 8px; padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
        background: rgba(255,255,255,0.92); border-top: 1px solid var(--border);
        backdrop-filter: blur(8px); z-index: 1000;
      }
      #mobileTabs button{ flex: 1; border-radius: 999px; font-size: 14px; padding: 10px 12px; }
      #mobileTabs button.active{ border-color: var(--pink-300); background: var(--pink-100); color: var(--wine); font-weight: 800; }

      body.tab-left #left{ display:block; }
      body.tab-cy #cyWrap{ display:block; }
      body.tab-right #right{ display:block; }

      #floatCtrl{ bottom: calc(84px + env(safe-area-inset-bottom)); }
      .onlyMobile{ display:block; }
      .onlyDesktop{ display:none; }
      footer#deskFooter{ display:none; }
    }

    #cyLoading{
      position: absolute; inset: 0; display: none; place-items: center;
      background: rgba(255,255,255,0.78); backdrop-filter: blur(6px); z-index: 80;
    }
    #cyLoading.show{ display: grid; }
    .loaderBox{ width: min(450px, 86vw); border: 1px solid var(--border); border-radius: 16px; background: #fff; padding: 20px; text-align: center; }
    .spinner{ width: 28px; height: 28px; border-radius: 999px; border: 3px solid #e5e7eb; border-top-color: var(--pink-500); animation: spin 0.9s linear infinite; margin: 0 auto 10px; }
    @keyframes spin{ to { transform: rotate(360deg); } }
    .usage-guide { margin-top: 20px; padding-top: 15px; border-top: 1px dashed var(--border); text-align: left; }
  </style>
</head>

<body>
  <div id="introDesktop" class="muted onlyDesktop" style="margin:8px 0 12px; padding:0 12px;">
    いちごの品種系統図を可視化したサイトです。
  </div>

  <div id="app">
    <div id="left">
      <h1 style="font-size:16px; margin:0 0 8px;">いちご 品種系統図（交配図）</h1>
      <div class="h">検索</div>
      <input id="q" type="text" placeholder="品種名 / 登録者で検索" />

      <div class="box">
        <div class="listHeader">
          <div class="h" style="margin:0;">品種リスト</div>
          <span id="listBadge" class="pill">準備中…</span>
        </div>
        <div class="seg" role="tablist">
          <button id="f_all" class="active">全品種</button>
          <button id="f_reg">登録品種</button>
          <button id="f_orphan">親が不明</button>
        </div>
        <div id="listWrap">
          <div class="emptyRow">読み込み中…</div>
        </div>
      </div>
    </div>

    <div id="cyWrap">
      <div id="cy"></div>
      <div id="cyLoading">
        <div class="loaderBox">
          <div class="spinner"></div>
          <div class="loaderTitle">読み込み中…</div>
          <div class="loaderSub">系統図を配置しています。</div>
          <div class="usage-guide onlyDesktop">
            <div style="font-weight:bold; color:var(--wine); margin-bottom:8px;">使い方</div>
            <ul class="muted" style="text-align:left; padding-left:20px;">
              <li>左パネルで検索・選択</li>
              <li>中央で系統図を確認（CLRで解除）</li>
              <li>右パネルで詳細情報を表示</li>
            </ul>
          </div>
        </div>
      </div>

      <div id="floatCtrl" class="onlyMobile">
        <div class="zcol">
          <div class="fbtn" id="btnZoomIn">＋</div>
          <div class="fbtn" id="btnZoomOut">－</div>
          <div class="fbtn" id="btnFit"><small>fit</small></div>
          <div id="btnClearHL"><small>CLR</small></div>
        </div>
        <div class="dpad">
          <div class="blank"></div><div class="fbtn" id="panUp">▲</div><div class="blank"></div>
          <div class="fbtn" id="panLeft">◀</div><div class="fbtn" id="panCenter"><small>●</small></div><div class="fbtn" id="panRight">▶</div>
          <div class="blank"></div><div class="fbtn" id="panDown">▼</div><div class="blank"></div>
        </div>
      </div>
    </div>

    <div id="right">
      <button id="btnAncestors" style="width: 100%; margin-bottom: 12px; border:1px solid var(--pink-300); color: var(--wine); font-weight: 800; display: none; padding:10px; border-radius:10px; background:#fff;">
        祖先のみ表示
      </button>
      <div class="h">詳細</div>
      <div id="detail" class="muted">品種をクリックしてください。</div>

      <div class="box">
        <div class="h" style="margin:0 0 6px;">レイアウト</div>
        <div class="layoutBtns">
          <button id="btnCose" class="active">CoSE</button>
          <button id="btnDagre">Dagre</button>
        </div>
      </div>
      
      <div class="box">
        <div class="h">凡例</div>
        <div style="font-size:12px;"><span class="tag">母 → 子</span> 実線</div>
        <div style="font-size:12px;"><span class="tag">父 → 子</span> 破線</div>
      </div>
    </div>
  </div>

  <div id="mobileTabs">
    <button data-tab="left">検索</button>
    <button data-tab="cy" class="active">系統図</button>
    <button data-tab="right">詳細</button>
  </div>

  <footer id="deskFooter" class="onlyDesktop">
    © 2025 Takumi Fujiki.
  </footer>

  <script>
    // 基本的な関数と変数の定義
    let cy = null;
    let hasHighlight = false;
    const mqMobile = window.matchMedia('(max-width: 900px)');
    const isMobileNow = () => mqMobile.matches;

    function esc(s) {
      if (!s) return '';
      return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function showCyLoading(show) {
      const el = document.getElementById('cyLoading');
      if (el) el.classList.toggle('show', show);
    }

    function updateClearButtons() {
      const m = document.getElementById('btnClearHL');
      if (m) m.style.display = hasHighlight ? 'grid' : 'none';
    }

    // タブ切り替え
    function setTab(name) {
      document.body.classList.remove('tab-left', 'tab-cy', 'tab-right');
      document.body.classList.add(`tab-${name}`);
      document.querySelectorAll('#mobileTabs button').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === name);
      });
      if (name === 'cy' && cy) {
        cy.resize();
      }
    }

    document.getElementById('mobileTabs').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-tab]');
      if (btn) setTab(btn.dataset.tab);
    });

    // 初期化（ダミーデータでの挙動確認用。実際は fetch でデータを読み込む想定）
    window.addEventListener('DOMContentLoaded', () => {
      if (isMobileNow()) setTab('cy');
      
      // ここに Cytoscape の初期化ロジック等を記述
      // 本来は elements.json を fetch して cy を作成します
    });

    // パン操作などの補助関数
    function initPanButtons() {
      // 既存の D-pad ロジックをここに統合
    }
  </script>
</body>
</html>
